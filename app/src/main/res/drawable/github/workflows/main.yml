name: Pocket Launcher Auto-Build
on:
  workflow_dispatch: # Botão para rodar manual na aba Actions
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK 32-bits
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK para Actions
        uses: actions/upload-artifact@v4
        with:
          name: PocketLauncher-A13-v7a
          path: app/build/outputs/apk/debug/*.apk
